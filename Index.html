<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DIY Wi-Fi Remote</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #121212; --accent: #007AFF; --key: #2a2a2a; --text: #efefef; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; touch-action: manipulation; }
        
        /* Connection Screen */
        #setup { padding: 30px; text-align: center; flex: 1; display: flex; flex-direction: column; justify-content: center; }
        input { padding: 12px; border-radius: 8px; border: 1px solid #444; background: #222; color: white; width: 80%; margin: 10px auto; font-size: 16px; }
        .btn-connect { padding: 12px 25px; border-radius: 8px; border: none; background: var(--accent); color: white; font-weight: bold; cursor: pointer; }

        /* Interface Styles */
        #main-ui { display: none; flex-direction: column; height: 100vh; }
        .tab-bar { display: flex; background: #1a1a1a; border-bottom: 1px solid #333; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; color: #666; font-weight: bold; font-size: 14px; }
        .tab-btn.active { color: var(--accent); border-bottom: 3px solid var(--accent); }

        .content { display: none; flex: 1; padding: 10px; flex-direction: column; }
        .active-content { display: flex; }

        /* Keyboard Grid */
        .kb-row { display: flex; gap: 4px; margin-bottom: 6px; justify-content: center; }
        .key { background: var(--key); border-radius: 6px; padding: 15px 5px; flex: 1; text-align: center; font-size: 14px; border: 1px solid #333; user-select: none; }
        .key:active { background: var(--accent); }
        .key.wide { flex: 2; }
        .key.space { flex: 5; background: #333; }

        /* Trackpad */
        #pad { flex: 1; background: #181818; border: 2px solid #333; border-radius: 20px; position: relative; touch-action: none; display: flex; align-items: center; justify-content: center; color: #444; }
        .mouse-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; height: 80px; margin-top: 10px; }
        .m-btn { background: var(--key); border: 1px solid #444; border-radius: 10px; color: white; font-weight: bold; }
    </style>
</head>
<body>

    <div id="setup">
        <h1>Remote Setup</h1>
        <p>Your ID: <span id="my-id" style="color:var(--accent); font-weight:bold;">...</span></p>
        <p style="font-size: 0.8em; color: #888;">Open this page on both devices.<br>Enter the Tablet's ID on your Phone.</p>
        <input type="text" id="target-id" placeholder="Paste Tablet ID here">
        <button class="btn-connect" onclick="connect()">Connect to Tablet</button>
        <div id="receiver-msg" style="margin-top:20px; display:none; color:var(--accent);">WAITING FOR PHONE...</div>
    </div>

    <div id="main-ui">
        <nav class="tab-bar">
            <button class="tab-btn active" id="btn-kb" onclick="showTab('kb')">KEYBOARD</button>
            <button class="tab-btn" id="btn-tp" onclick="showTab('tp')">TRACKPAD</button>
        </nav>

        <div id="kb" class="content active-content">
            <div class="kb-row">
                <div class="key" onclick="send('key', 'Q')">Q</div><div class="key" onclick="send('key', 'W')">W</div>
                <div class="key" onclick="send('key', 'E')">E</div><div class="key" onclick="send('key', 'R')">R</div>
                <div class="key" onclick="send('key', 'T')">T</div><div class="key" onclick="send('key', 'Y')">Y</div>
                <div class="key" onclick="send('key', 'U')">U</div><div class="key" onclick="send('key', 'I')">I</div>
                <div class="key" onclick="send('key', 'O')">O</div><div class="key" onclick="send('key', 'P')">P</div>
            </div>
            <div class="kb-row">
                <div class="key" onclick="send('key', 'A')">A</div><div class="key" onclick="send('key', 'S')">S</div>
                <div class="key" onclick="send('key', 'D')">D</div><div class="key" onclick="send('key', 'F')">F</div>
                <div class="key" onclick="send('key', 'G')">G</div><div class="key" onclick="send('key', 'H')">H</div>
                <div class="key" onclick="send('key', 'J')">J</div><div class="key" onclick="send('key', 'K')">K</div>
                <div class="key" onclick="send('key', 'L')">L</div>
                <div class="key wide" onclick="send('key', 'BKSP')">⌫</div>
            </div>
            <div class="kb-row">
                <div class="key" onclick="send('key', 'Z')">Z</div><div class="key" onclick="send('key', 'X')">X</div>
                <div class="key" onclick="send('key', 'C')">C</div><div class="key" onclick="send('key', 'V')">V</div>
                <div class="key" onclick="send('key', 'B')">B</div><div class="key" onclick="send('key', 'N')">N</div>
                <div class="key" onclick="send('key', 'M')">M</div>
                <div class="key wide" onclick="send('key', 'ENT')">ENTER</div>
            </div>
            <div class="kb-row">
                <div class="key space" onclick="send('key', ' ')">SPACE</div>
            </div>
        </div>

        <div id="tp" class="content">
            <div id="pad">TOUCH TO MOVE</div>
            <div class="mouse-btns">
                <button class="m-btn" onclick="send('click', 'left')">LEFT</button>
                <button class="m-btn" onclick="send('click', 'right')">RIGHT</button>
            </div>
        </div>
    </div>

    <script>
        const peer = new Peer();
        let conn;

        peer.on('open', (id) => {
            document.getElementById('my-id').innerText = id;
            document.getElementById('receiver-msg').style.display = 'block';
        });

        // BE THE TABLET (Receiver)
        peer.on('connection', (connection) => {
            conn = connection;
            document.getElementById('setup').innerHTML = "<h1>TABLET MODE</h1><p>Connected! Keeping this tab open...</p><div id='log' style='font-family:monospace; color:#888;'></div>";
            conn.on('data', (data) => {
                const log = document.getElementById('log');
                log.innerText = "Received: " + JSON.stringify(data);
                // NOTE: To type system-wide, this HTML would need to be an APK.
            });
        });

        // BE THE PHONE (Controller)
        function connect() {
            const targetId = document.getElementById('target-id').value;
            conn = peer.connect(targetId);
            conn.on('open', () => {
                document.getElementById('setup').style.display = 'none';
                document.getElementById('main-ui').style.display = 'flex';
            });
        }

        function send(type, val) {
            if (conn && conn.open) {
                conn.send({ type, val });
            }
        }

        function showTab(tab) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active-content'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tab).classList.add('active-content');
            document.getElementById('btn-' + tab).classList.add('active');
        }

        // Trackpad Logic
        let lastX = 0, lastY = 0;
        const pad = document.getElementById('pad');
        pad.addEventListener('touchstart', e => {
            lastX = e.touches[0].clientX;
            lastY = e.touches[0].clientY;
        });
        pad.addEventListener('touchmove', e => {
            const dx = e.touches[0].clientX - lastX;
            const dy = e.touches[0].clientY - lastY;
            lastX = e.touches[0].clientX;
            lastY = e.touches[0].clientY;
            send('move', { dx, dy });
        });
    </script>
</body>
</html>
